<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant - FastAPI Frontend</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>RAG Assistant</h1>
            <p>Retrieval-Augmented Generation System</p>
        </header>

        <nav>
            <button class="tab-btn active" onclick="showTab('query')">Query</button>
            <button class="tab-btn" onclick="showTab('ingest')">Ingest Documents</button>
            <button class="tab-btn" onclick="showTab('info')">System Info</button>
        </nav>

        <div id="query-tab" class="tab-content active">
            <h2>Query the RAG System</h2>
            <form id="query-form">
                <div class="form-group">
                    <label for="query-text">Query:</label>
                    <textarea id="query-text" name="query" required placeholder="Enter your question here..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="k-retrieve">Retrieve Count:</label>
                        <input type="number" id="k-retrieve" name="k_retrieve" value="5" min="1" max="20">
                    </div>
                    <div class="form-group">
                        <label for="k-rerank">Rerank Count:</label>
                        <input type="number" id="k-rerank" name="k_rerank" value="3" min="1" max="10">
                    </div>
                    <div class="form-group">
                        <label for="use-reranking">Use Reranking:</label>
                        <input type="checkbox" id="use-reranking" name="use_reranking" checked>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Submit Query</button>
            </form>
            <div id="query-result" class="result-container"></div>
        </div>

        <div id="ingest-tab" class="tab-content">
            <h2>Ingest Documents</h2>
            <div class="ingest-options">
                <div class="ingest-option">
                    <h3>Upload File</h3>
                    <form id="file-form" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="file-input">Select File:</label>
                            <input type="file" id="file-input" name="file" accept=".txt,.pdf,.doc,.docx,.md" required>
                        </div>
                        <div class="form-group">
                            <label for="file-metadata">Metadata (JSON):</label>
                            <textarea id="file-metadata" name="metadata" placeholder='{"author": "John Doe", "category": "documentation"}'></textarea>
                        </div>
                        <button type="submit" class="btn-secondary">Upload File</button>
                    </form>
                </div>

                <div class="ingest-option">
                    <h3>Ingest URL</h3>
                    <form id="url-form">
                        <div class="form-group">
                            <label for="url-input">URL:</label>
                            <input type="url" id="url-input" name="url" required placeholder="https://example.com">
                        </div>
                        <div class="form-group">
                            <label for="url-metadata">Metadata (JSON):</label>
                            <textarea id="url-metadata" name="metadata" placeholder='{"source": "web", "category": "article"}'></textarea>
                        </div>
                        <button type="submit" class="btn-secondary">Ingest URL</button>
                    </form>
                </div>

                <div class="ingest-option">
                    <h3>Ingest Text</h3>
                    <form id="text-form">
                        <div class="form-group">
                            <label for="text-input">Text Content:</label>
                            <textarea id="text-input" name="file_path" required placeholder="Paste your text content here..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="text-metadata">Metadata (JSON):</label>
                            <textarea id="text-metadata" name="metadata" placeholder='{"source": "manual", "category": "notes"}'></textarea>
                        </div>
                        <button type="submit" class="btn-secondary">Ingest Text</button>
                    </form>
                </div>
            </div>
            <div id="ingest-result" class="result-container"></div>
        </div>

        <div id="info-tab" class="tab-content">
            <h2>System Information</h2>
            <button onclick="loadSystemInfo()" class="btn-secondary">Load System Info</button>
            <button onclick="loadCollectionStats()" class="btn-secondary">Load Collection Stats</button>
            <div id="info-result" class="result-container"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
